<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #121212;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px 16px;
      text-align: center;
    }
    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
    h1 {
      color: #F5C518;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    a.go-btn {
      display: block;
      background: #F5C518;
      color: #121212;
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    a.go-btn:hover {
      background: #e0b400;
    }
  </style>
</head>
<body>
  <div class="icon">🎬</div>
  <h1>IMDB Click Race</h1>
  <a class="go-btn" href="https://www.imdb.com" target="_blank">Go to IMDB to play!</a>
</body>
</html>
